<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Zap Multiplayer</title>

<style>
body{
font-family:Arial;
background:#e5ddd5;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.chat{
width:700px;
height:900px;
background:white;
display:flex;
flex-direction:column;
border-radius:10px;
overflow:hidden;
}

.header{
background:#25D366;
color:white;
padding:15px;
font-weight:bold;
}

.messages{
flex:1;
padding:10px;
overflow-y:auto;
}

.msg{
display:flex;
margin:6px 0;
}

.bubble{
padding:8px 12px;
border-radius:12px;
max-width:70%;
}

.me{
background:#DCF8C6;
margin-left:auto;
}

.other{
background:#ffffff;
margin-right:auto;
border:1px solid #ddd;
}

.name{
font-size:11px;
font-weight:bold;
margin-bottom:2px;
}

.input{
display:flex;
border-top:1px solid #ccc;
}

.input input{
flex:1;
padding:10px;
border:none;
outline:none;
}

.input button{
background:#25D366;
border:none;
color:white;
padding:10px 15px;
cursor:pointer;
}

.time{
font-size:10px;
color:#777;
text-align:right;
margin-top:2px;
}
</style>

</head>

<body>

<div class="chat">

<div class="header">
Mini Zap Multiplayer
</div>

<div id="typing" style="font-size:12px; padding:5px 10px; color:gray;"></div>
<div class="messages" id="messages"></div>
<div id="typing"></div>
<div class="input">
<input id="msg" placeholder="Digite...">
<button id="send">Enviar</button>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCv9v3rKozsyPnWRRAeeEfOu-QWyCJR4b0",
    authDomain: "zapzap-db5d4.firebaseapp.com",
    projectId: "zapzap-db5d4",
    storageBucket: "zapzap-db5d4.firebasestorage.app",
    messagingSenderId: "291985295996",
    appId: "1:291985295996:web:c0fd08ea08f906cde557f9",
    measurementId: "G-9E897HB04V"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let username = localStorage.getItem("chat_username");

if(!username){
    username = prompt("Digite seu nome de usuário:");
    localStorage.setItem("chat_username", username);
}

localStorage.setItem("username", username);

const input = document.getElementById("msg");
const messagesDiv = document.getElementById("messages");
const sendBtn = document.getElementById("send");

sendBtn.onclick = function(){

if(input.value.trim() === "") return;

let now = new Date();

let time = now.getHours().toString().padStart(2,"0") + ":" +
           now.getMinutes().toString().padStart(2,"0");

push(ref(db,"chat"),{
name: username,
text: input.value,
time: time
}) 

input.value="";

};

onChildAdded(ref(db,"chat"),(data)=>{

let msg = data.val();

let div = document.createElement("div");
div.className = "msg";

let bubble = document.createElement("div");

if(msg.name === username){
bubble.className = "bubble me";
}else{
bubble.className = "bubble other";
}

bubble.innerHTML = `
<div class="name">${msg.name}</div>
<div>${msg.text}</div>
<div class="time">${msg.time}</div>
`;

div.appendChild(bubble);

messagesDiv.appendChild(div);

messagesDiv.scrollTop = messagesDiv.scrollHeight;


});

import { set, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const typingRef = ref(db, "typing/" + username);

input.addEventListener("input", () => {

set(typingRef, true);

clearTimeout(window.typingTimeout);

window.typingTimeout = setTimeout(()=>{
remove(typingRef);
},2000);

});

const typingDiv = document.getElementById("typing");

onValue(ref(db,"typing"), (snapshot)=>{

let data = snapshot.val();

if(!data){
typingDiv.innerText="";
return;
}

let users = Object.keys(data).filter(u => u !== username);

if(users.length > 0){
typingDiv.innerText = users.join(", ") + " está digitando...";
}else{
typingDiv.innerText="";
}

});
</script>

</body>
</html>
